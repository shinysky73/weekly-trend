services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=post1234
      - POSTGRES_DB=weekly-trend
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    expose:
      - "3002"
    env_file:
      - apps/api-server/.env
    environment:
      - DATABASE_URL=postgresql://postgres:post1234@db:5432/weekly-trend?schema=public
      - CORS_ORIGIN=http://localhost:9000
    depends_on:
      db:
        condition: service_healthy

  user-client:
    build:
      context: .
      dockerfile: apps/user-client/Dockerfile
      args:
        - VITE_API_URL=http://localhost:3002
    ports:
      - "9000:80"
    depends_on:
      - api-server

volumes:
  pgdata:
