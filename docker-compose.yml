services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=post1234
      - POSTGRES_DB=weekly-trend
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    ports:
      - "3002:3002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - apps/api-server/.env
    environment:
      - CORS_ORIGIN=http://localhost:5175
      - DATABASE_URL=postgresql://postgres:post1234@db:5432/weekly-trend?schema=public
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  user-client:
    build:
      context: .
      dockerfile: apps/user-client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-server

volumes:
  uploads:
  pgdata:
