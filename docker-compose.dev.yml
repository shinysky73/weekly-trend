# Dev environment override — source changes reflected immediately (HMR)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml down

services:
  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile.dev
    volumes:
      - ./apps/api-server/src:/app/apps/api-server/src
      - ./apps/api-server/prisma:/app/apps/api-server/prisma
      - uploads:/app/uploads

  user-client:
    build:
      context: .
      dockerfile: apps/user-client/Dockerfile.dev
    ports:
      - "5175:5175"
    environment:
      - API_TARGET=http://api-server:3002
    volumes:
      - ./apps/user-client/src:/app/apps/user-client/src
      - ./apps/user-client/index.html:/app/apps/user-client/index.html
